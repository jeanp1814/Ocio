<!DOCTYPE html>
<html>
<head>
    <title>Cuadrado</title>
</head>
<body>
    <canvas id="canvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        ctx.beginPath();
        ctx.rect(100, 100, 100, 100);
        ctx.stroke();
    </script>
</body>
</html>
